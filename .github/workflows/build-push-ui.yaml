name: Build and Push UI Service to ECR

on:
  push:
    branches:
      - main
    paths:
      - "src/ui/**"
      # - ".github/workflows/build-push-ui.yaml" # Uncomment during workflow testing

permissions:
  id-token: write

concurrency:
  group: ui-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: retail-store/ui
  MY_GETHUB_REPO: mohamedsameh2002/kubernetes-helm-retail-store.git

defaults:
  run:
    shell: bash

jobs:
  build-and-push-ui:
    environment: Production
    name: Build & Push UI Image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      ##########################################################################
      # Checkout
      ##########################################################################
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      ##########################################################################
      # AWS Authentication (OIDC)
      ##########################################################################
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::358592703668:role/github-actions-oidc-role-ui3
          aws-region: ${{ env.AWS_REGION }}

      ##########################################################################
      # Login to Amazon ECR
      ##########################################################################
      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      ##########################################################################
      # Docker Buildx
      ##########################################################################
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      ##########################################################################
      # Image Metadata
      ##########################################################################
      - name: Prepare Image Metadata
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_BASE="${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}"

          echo "SHORT_SHA=$SHORT_SHA" >> "$GITHUB_ENV"
          echo "IMAGE_BASE=$IMAGE_BASE" >> "$GITHUB_ENV"

          echo "Using image:"
          echo "$IMAGE_BASE:latest"
          echo "$IMAGE_BASE:sha-$SHORT_SHA"

      ##########################################################################
      # Build & Push
      ##########################################################################
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./src/ui
          push: true

          tags: |
            ${{ env.IMAGE_BASE }}:latest
            ${{ env.IMAGE_BASE }}:sha-${{ env.SHORT_SHA }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

          labels: |
            org.opencontainers.image.title=Retail Store UI
            org.opencontainers.image.description=Retail Store UI Service
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      ##########################################################################
      # Configure Git
      ##########################################################################
      - name: Clone Helm Repository
        run: |
          git clone https://mohamedsameh2002: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@github.com/${{ github.repository_owner }}/kubernetes-helm-retail-store.git 

          cd kubernetes-helm-retail-store

          git config user.name "ci-bot"
          git config user.email "ci-bot@stacksimplify.com"

      ##########################################################################
      # Update Helm Values
      ##########################################################################
      - name: Update Helm Image Tag
        working-directory: kubernetes-helm-retail-store/helm/retail-store-sample-ui-chart
        run: |

          sed -i \
            "s|^  tag: .*|  tag: sha-$SHORT_SHA|" \
            values.yaml

          if git diff --quiet; then
            echo "No changes detected."
            exit 0
          fi

          git add values.yaml
          git commit -m "Update UI image tag to sha-$SHORT_SHA"
          git push origin main

      ##########################################################################
      # Job Summary
      ##########################################################################
      - name: Publish Build Summary
        run: |
          {
            echo "# UI Service Build"
            echo ""
            echo "## Build Information"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| AWS Region | $AWS_REGION |"
            echo "| Repository | $ECR_REPOSITORY |"
            echo "| Image | $IMAGE_BASE:latest |"
            echo "| Immutable Tag | $IMAGE_BASE:sha-$SHORT_SHA |"
            echo "| Commit | $GITHUB_SHA |"
          } >> "$GITHUB_STEP_SUMMARY"

      ##########################################################################
      # Complete
      ##########################################################################
      - name: Complete
        run: echo "UI pipeline completed successfully."

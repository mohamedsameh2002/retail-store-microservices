name: Build and Push Catalog Service to ECR

on:
  push:
    branches:
      - main
    paths:
      - "src/catalog/**"

permissions:
  id-token: write

concurrency:
  group: catalog-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  MY_GITHUB_REPO: ${{ vars.HELM_REPO }}
  ECR_REPOSITORY: retail-store/catalog

defaults:
  run:
    shell: bash

jobs:
  build-and-push-catalog:
    name: Build & Push catalog Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: Production

    steps:
      ##########################################################################
      # Checkout
      ##########################################################################
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      ##########################################################################
      # AWS Authentication (OIDC)
      ##########################################################################
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::358592703668:role/github-actions-oidc-role-ui3
          aws-region: ${{ env.AWS_REGION }}

      ##########################################################################
      # Login to Amazon ECR
      ##########################################################################
      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      ##########################################################################
      # Docker Buildx
      ##########################################################################
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      ##########################################################################
      # Image Metadata
      ##########################################################################
      - name: Prepare Image Metadata
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_BASE="${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}"

          echo "SHORT_SHA=$SHORT_SHA" >> "$GITHUB_ENV"
          echo "IMAGE_BASE=$IMAGE_BASE" >> "$GITHUB_ENV"

          echo "Using image:"
          echo "$IMAGE_BASE:latest"
          echo "$IMAGE_BASE:sha-$SHORT_SHA"

      ##########################################################################
      # Build & Push
      ##########################################################################
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./src/catalog
          push: true

          tags: |
            ${{ env.IMAGE_BASE }}:latest
            ${{ env.IMAGE_BASE }}:sha-${{ env.SHORT_SHA }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

          labels: |
            org.opencontainers.image.title=Retail Store catalog
            org.opencontainers.image.description=Retail Store catalog Service
            org.opencontainers.image.source=https://github.com/${{ github.repository }}/src/catalog
            org.opencontainers.image.revision=${{ github.sha }}

      ##########################################################################
      # Configure Git
      ##########################################################################
      - name: Clone Helm Repository
        run: |
          git clone https://x-access-token:${{ secrets.HELM_REPO_TOKEN }}@github.com/${{ env.MY_GITHUB_REPO }}

          cd kubernetes-helm-retail-store

          git config user.name "ci-bot"
          git config user.email "ci-bot@stacksimplify.com"

      ##########################################################################
      # Update Helm Values
      ##########################################################################
      - name: Update Helm Image Tag
        working-directory: kubernetes-helm-retail-store/helm/catalog-chart
        run: |
          sed -i "s|^  tag: .*|  tag: sha-$SHORT_SHA|" values.yaml

          if git diff --quiet -- values.yaml; then
            echo "No changes detected."
            exit 0
          fi

          git add values.yaml
          git commit -m "Update catalog image tag to sha-$SHORT_SHA"

          git pull --rebase origin main
          git push origin main

      ##########################################################################
      # Job Summary
      ##########################################################################
      - name: Publish Build Summary
        run: |
          {
            echo "# catalog Service Build"
            echo ""
            echo "## Build Information"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| AWS Region | $AWS_REGION |"
            echo "| Repository | $ECR_REPOSITORY |"
            echo "| Image | $IMAGE_BASE:latest |"
            echo "| Immutable Tag | $IMAGE_BASE:sha-$SHORT_SHA |"
            echo "| Commit | $GITHUB_SHA |"
          } >> "$GITHUB_STEP_SUMMARY"

      ##########################################################################
      # Complete
      ##########################################################################
      - name: Complete
        run: echo "catalog pipeline completed successfully."
